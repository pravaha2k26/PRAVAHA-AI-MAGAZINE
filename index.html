<!DOCTYPE html>

<html lang="en">
<head>

<title>PRAVAHA – AI Magazine</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Times New Roman", Times, serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */

#aiCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

/* ROBOT */

#robotFollower{
position:fixed;
top:0;
left:0;
width:120px;
height:160px;
pointer-events:none;
z-index:-1;
transition:transform 0.1s linear;
opacity:0.9;
}

/* ARM MOVEMENTS */

.leftArm{
animation:waveLeft 2s infinite ease-in-out;
transform-origin:35px 55px;
}

.rightArm{
animation:waveRight 2s infinite ease-in-out;
transform-origin:65px 55px;
}

@keyframes waveLeft{
0%{transform:rotate(0deg);}
50%{transform:rotate(-20deg);}
100%{transform:rotate(0deg);}
}

@keyframes waveRight{
0%{transform:rotate(0deg);}
50%{transform:rotate(20deg);}
100%{transform:rotate(0deg);}
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.logo img{
height:60px;
}

.nav-right{
display:flex;
gap:20px;
align-items:center;
}

.nav-right a{
color:white;
text-decoration:none;
font-size:18px;
}

/* TITLE */

.title{
text-align:center;
}

.title h1{
font-size:60px;
letter-spacing:4px;
}

.caption{
font-style:italic;
}

.title hr{
margin:15px auto;
width:350px;
border:1px solid #00f6ff;
}

/* MENU */

.category-bar{
display:flex;
justify-content:center;
gap:60px;
border-top:1px solid #444;
border-bottom:1px solid #444;
padding:12px;
}

.category-bar a{
text-decoration:none;
color:white;
font-size:18px;
}

.category-bar a:hover{
color:#00f6ff;
}

/* SLIDER */

.slider-container{
width:80%;
margin:60px auto;
overflow:hidden;
position:relative;
}

.slider{
display:flex;
transition:transform 1s ease;
}

.slide{
min-width:100%;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.05);
border-radius:10px;
text-align:center;
cursor:pointer;
}

.slide img{
width:100%;
height:420px;
object-fit:cover;
border-radius:10px 10px 0 0;
}

.slide h2{
padding:20px;
font-size:26px;
}

/* ARROWS */

.arrow{
position:absolute;
top:45%;
transform:translateY(-50%);
background:rgba(0,0,0,0.6);
border:none;
color:white;
font-size:40px;
cursor:pointer;
padding:10px 15px;
border-radius:50%;
}

.arrow:hover{
background:#00f6ff;
color:black;
}

.arrow.left{left:10px;}
.arrow.right{right:10px;}

</style>

</head>

<script>

/* ROBOT FOLLOW CURSOR */

const robot=document.getElementById("robotFollower");

document.addEventListener("mousemove",(e)=>{
robot.style.transform=`translate(${e.clientX-60}px,${e.clientY-80}px)`
});

/* SLIDER */

let index=0;
const slider=document.getElementById("slider");
const slides=document.querySelectorAll(".slide");
const totalSlides=slides.length;

function updateSlider(){
slider.style.transform="translateX(-"+index*100+"%)";
}

function nextSlide(){
index++;
if(index>=totalSlides){index=0;}
updateSlider();
}

function prevSlide(){
index--;
if(index<0){index=totalSlides-1;}
updateSlider();
}

setInterval(nextSlide,5000);

/* THREE JS BACKGROUND */

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer=new THREE.WebGLRenderer({
canvas:document.getElementById("aiCanvas"),
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

camera.position.z=5;

/* PARTICLES */

const particlesGeometry=new THREE.BufferGeometry();
const particlesCount=2000;
const posArray=new Float32Array(particlesCount*3);

for(let i=0;i<particlesCount*3;i++){
posArray[i]=(Math.random()-0.5)*20;
}

particlesGeometry.setAttribute(
"position",
new THREE.BufferAttribute(posArray,3)
);

const particlesMaterial=new THREE.PointsMaterial({
size:0.02,
color:0x00f6ff
});

const particlesMesh=new THREE.Points(
particlesGeometry,
particlesMaterial
);

scene.add(particlesMesh);

/* SATELLITES */

const satellites=[];

for(let i=0;i<5;i++){

const body=new THREE.Mesh(
new THREE.BoxGeometry(0.3,0.2,0.2),
new THREE.MeshBasicMaterial({color:0xffffff})
);

const panel1=new THREE.Mesh(
new THREE.BoxGeometry(0.6,0.05,0.2),
new THREE.MeshBasicMaterial({color:0x00f6ff})
);

const panel2=panel1.clone();

panel1.position.x=-0.5;
panel2.position.x=0.5;

const sat=new THREE.Group();
sat.add(body);
sat.add(panel1);
sat.add(panel2);

sat.position.x=Math.random()*10-5;
sat.position.y=Math.random()*6-3;
sat.position.z=Math.random()*-5;

scene.add(sat);
satellites.push(sat);

}

/* ANIMATION */

function animate(){

requestAnimationFrame(animate);

particlesMesh.rotation.y+=0.0005;

satellites.forEach((sat,i)=>{

sat.position.x+=0.002*(i+1);

if(sat.position.x>6){
sat.position.x=-6;
}

sat.rotation.y+=0.01;

});

renderer.render(scene,camera);

}

animate();

</script>
