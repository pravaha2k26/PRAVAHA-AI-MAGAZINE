<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>PRAVAHA – Feedback</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Times New Roman", Times, serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* AI BACKGROUND */

#aiCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* TITLE */

.title{
text-align:center;
margin-top:20px;
}

.title h1{
font-size:60px;
letter-spacing:4px;
}

.caption{
font-style:italic;
font-size:18px;
}

.title hr{
margin:15px auto;
width:350px;
border:1px solid #00f6ff;
}

/* MENU */

.menu{
display:flex;
justify-content:center;
gap:60px;
border-top:1px solid #444;
border-bottom:1px solid #444;
padding:12px;
margin-top:10px;
}

.menu a{
text-decoration:none;
color:white;
font-size:18px;
}

.menu a:hover{
color:#00f6ff;
}

/* FEEDBACK FORM */

.feedback{
width:40%;
margin:80px auto;
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:10px;
backdrop-filter:blur(5px);
}

.feedback h2{
text-align:center;
margin-bottom:30px;
}

.feedback input,
.feedback textarea{

width:100%;
padding:12px;
margin:12px 0;
border:none;
border-radius:5px;
font-size:16px;

}

.feedback button{

width:100%;
padding:12px;
background:#00f6ff;
border:none;
font-size:18px;
cursor:pointer;
border-radius:5px;

}

.feedback button:hover{
background:#0ff;
}

#message{
text-align:center;
margin-top:20px;
font-size:18px;
color:#00f6ff;
}

</style>

</head>

<body>

<canvas id="aiCanvas"></canvas>

<!-- TITLE -->

<div class="title">

<h1>PRAVAHA</h1>
<div class="caption">~The Future of Technology</div>
<hr>

</div>

<!-- MENU -->

<div class="menu">

<a href="index.html">HOME</a> <a href="contents.html">CONTENTS</a> <a href="magazine.html?topic=professionals">MAGAZINE</a> <a href="feedback.html">FEEDBACK</a>

</div>


<!-- FEEDBACK FORM -->

<div class="feedback">

<h2>Feedback</h2>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea rows="5" placeholder="Your Feedback"></textarea>

<button onclick="submitFeedback()">Submit Feedback</button>

<p id="message"></p>

</div>

<script>

/* FEEDBACK MESSAGE */

function submitFeedback(){

document.getElementById("message").innerHTML="✅ Feedback Submitted Successfully!";

}

/* 3D AI BACKGROUND */

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer=new THREE.WebGLRenderer({
canvas:document.getElementById("aiCanvas"),
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

camera.position.z=5;

const particlesGeometry=new THREE.BufferGeometry();
const particlesCount=2000;

const posArray=new Float32Array(particlesCount*3);

for(let i=0;i<particlesCount*3;i++){

posArray[i]=(Math.random()-0.5)*20;

}

particlesGeometry.setAttribute(
"position",
new THREE.BufferAttribute(posArray,3)
);

const particlesMaterial=new THREE.PointsMaterial({
size:0.02,
color:0x00f6ff
});

const particlesMesh=new THREE.Points(
particlesGeometry,
particlesMaterial
);

scene.add(particlesMesh);

function animate(){

requestAnimationFrame(animate);

particlesMesh.rotation.y+=0.0007;

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
